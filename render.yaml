services:
  - type: web
    name: phosur
    runtime: docker
    repo: https://github.com/harmitvagadiya123-dotcom/Phosur
    branch: main
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8000"
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: NOTIFY_TO
        sync: false
      - key: NOTIFY_CC
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_SHEET_NAME
        sync: false
      - key: GOOGLE_CREDENTIALS_BASE64
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: BG001_SHEET_ID
        value: "1bnz46ES2olQP7vPqvIpthBhF08TQ5RCN28ytcjjszsM"
      # ── Autoresponder Support Agent ──
      - key: AUTORESPONDER_EMAIL
        sync: false
      - key: AUTORESPONDER_PASSWORD
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      # ── WordPress (BG001 Step 3) ──
      - key: WP_PUBLISH_URL
        sync: false
      - key: WP_SECRET
        sync: false
      - key: WP_AUTHOR
        sync: false

