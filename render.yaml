services:
  - type: web
    name: phosur
    runtime: docker
    repo: https://github.com/harmitvagadiya123-dotcom/Phosur
    branch: main
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8000"
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: NOTIFY_TO
        sync: false
      - key: NOTIFY_CC
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_SHEET_NAME
        sync: false
      - key: GOOGLE_CREDENTIALS_BASE64
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: BG001_SHEET_ID
        sync: false

  - type: cron
    name: phosur-bg001-cron
    runtime: docker
    repo: https://github.com/harmitvagadiya123-dotcom/Phosur
    branch: main
    plan: free
    schedule: "0 9 * * *" # Runs every day at 9 AM UTC
    dockerCommand: "python agent/bg001_step_1/code/run_agent.py"
    envVars:
      - key: GOOGLE_CREDENTIALS_BASE64
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: BG001_SHEET_ID
        sync: false
